<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 柔和流动渐变 -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#A5B4FC"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- 液态 S 曲线 -->
  <path 
  class="flow-line"
  d="
    M 36 150
    C 70 210, 120 60, 150 120
    C 180 180, 210 110, 222 135
  "
  fill="none"
  stroke="url(#grad)"
  stroke-width="24"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- 左侧：卦象节奏（长短变化） -->
  <rect class="bar bar1" x="64" y="85" width="12" height="80" rx="6" fill="#BFDBFE"/>   <!-- 阳 -->
  <rect class="bar bar2" x="84" y="100" width="12" height="40" rx="6" fill="#BFDBFE"/>  <!-- 阴 -->
  <rect class="bar bar3" x="104" y="80" width="12" height="90" rx="6" fill="#BFDBFE"/>  <!-- 阳 -->

  <!-- 右侧：镜像节奏 -->
  <rect class="bar bar4" x="150" y="95" width="12" height="60" rx="6" fill="#BFDBFE"/>  <!-- 阴 -->
  <rect class="bar bar5" x="170" y="75" width="12" height="100" rx="6" fill="#BFDBFE"/> <!-- 阳 -->
  <rect class="bar bar6" x="190" y="105" width="12" height="50" rx="6" fill="#BFDBFE"/> <!-- 阴 -->
</svg>